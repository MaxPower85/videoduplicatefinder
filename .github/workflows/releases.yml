name: Build releases

on: [push]
    
jobs:
  build:

    strategy:
      matrix:
        kind: ['linux', 'windows', 'macOS', 'macOSarm64', 'linuxarm64']
        include:
          - kind: linux
            os: ubuntu-latest
            target: linux-x64
            name: linux-x64
          - kind: windows
            os: windows-latest
            target: win-x64
            name: win-x64
          - kind: macOS
            os: macos-latest
            target: osx-x64
            name: osx-x64
          - kind: macOSarm64
            os: macos-latest
            target: osx-arm64
            name: osx-arm64
          - kind: linuxarm64
            os: ubuntu-latest
            target: linux-arm64
            name: linux-arm64
            
    runs-on: ${{ matrix.os }}

    steps:
    - uses: actions/checkout@v4
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '9.0.x'
    - name: Declare some variables
      id: vars
      shell: bash
      run: echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
    - name: Build
      shell: bash
      run: |
          release_name="App-${{ matrix.target }}"
          # Add nuget sources
          dotnet nuget add source https://www.myget.org/F/sixlabors/api/v3/index.json
          # Build everything
          dotnet publish ./VDF.GUI/VDF.GUI.csproj -c Release -v q --self-contained -r "${{ matrix.target }}" -o "outputFolder"
          
          # Logic for macOS .app bundling
            if [[ "${{ matrix.target }}" == "osx-"* ]]; then
            APP_NAME="VideoDuplicateFinder.app"
            mkdir -p "$APP_NAME/Contents/MacOS"
            mkdir -p "$APP_NAME/Contents/Resources"
            
            # Use ditto with HFS compression for all app components
            ditto --hfsCompression outputFolder/ "$APP_NAME/Contents/MacOS/"
            ditto --hfsCompression "Info.plist" "$APP_NAME/Contents/Info.plist"
            ditto --hfsCompression "macOS_AppIcon.icns" "$APP_NAME/Contents/Resources/AppIcon.icns"

            # FFmpeg download logic (separated parts)
            FF_DOMAIN="https://ffmpeg.martin-riedl.de"
            FF_PATH="/redirect/latest/macos"
            
            if [[ "${{ matrix.target }}" == "osx-arm64" ]]; then
              ARCH="arm64"
            else
              ARCH="amd64"
            fi

            # Download and extract ffmpeg/ffprobe
            curl -L "${FF_DOMAIN}${FF_PATH}/${ARCH}/release/ffmpeg.zip" -o ffmpeg.zip
            curl -L "${FF_DOMAIN}${FF_PATH}/${ARCH}/release/ffprobe.zip" -o ffprobe.zip
            
            unzip -o ffmpeg.zip -d "$APP_NAME/Contents/MacOS/"
            unzip -o ffprobe.zip -d "$APP_NAME/Contents/MacOS/"
            
            # Set executable permissions (Crucial for macOS)
            chmod +x "$APP_NAME/Contents/MacOS/VDF.GUI"
            chmod +x "$APP_NAME/Contents/MacOS/ffmpeg"
            chmod +x "$APP_NAME/Contents/MacOS/ffprobe"
            
            # Final archive and cleanup
            tar czvf "${release_name}.tar.gz" "$APP_NAME"
            rm -rf "$APP_NAME" ffmpeg.zip ffprobe.zip

          # Original Windows logic
          elif [ "${{ matrix.target }}" == "win-x64" ]; then
            7z a -tzip "${release_name}.zip" "./outputFolder/*"
          
          # Original Linux logic
          else
            tar czvf "${release_name}.tar.gz" "outputFolder"
          fi
          
          # Delete output directory
          rm -r "outputFolder"
          rm AppIcon.icns
          
    - name: Publish
      uses: softprops/action-gh-release@v2
      with:
          tag_name: 3.0.x
          files: App*
          body: |
            Note: These are daily builds. Attachments are automatically created and replaced on every new commit. Regardless of what the message above says. If you experience upgrade issues you may need to delete your 'ScannedFiles.db' file in VDF folder.
            Last build based on ${{ steps.vars.outputs.sha_short }}
      env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
