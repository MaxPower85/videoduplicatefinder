on: [push]
    
jobs:
  build:

    strategy:
      matrix:
        kind: ['linux', 'windows', 'macOS', 'macOSarm64', 'linuxarm64']
        include:
          - kind: linux
            os: ubuntu-latest
            target: linux-x64
            name: linux-x64
          - kind: windows
            os: windows-latest
            target: win-x64
            name: win-x64
          - kind: macOS
            os: macos-14
            target: osx-x64
            name: osx-x64
          - kind: macOSarm64
            os: macos-14
            target: osx-arm64
            name: osx-arm64
          - kind: linuxarm64
            os: ubuntu-latest
            target: linux-arm64
            name: linux-arm64
            
    runs-on: ${{ matrix.os }}

    steps:
    - uses: actions/checkout@v4
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '9.0.x'
    - name: Declare some variables
      id: vars
      shell: bash
      run: echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
    - name: Build
      shell: bash
      run: |
          release_name="App-${{ matrix.target }}"
          # Add nuget sources
          dotnet nuget add source https://www.myget.org/F/sixlabors/api/v3/index.json
          # Build everything
          dotnet publish ./VDF.GUI/VDF.GUI.csproj -c Release -v q --self-contained -r "${{ matrix.target }}" -o "outputFolder"
          
          # Logic for macOS .app bundling
          if [[ "${{ matrix.target }}" == "osx-"* ]]; then
          APP_NAME="VideoDuplicateFinder.app"
            
          # Create the bundle structure
          mkdir -p "$APP_NAME/Contents/MacOS"
          mkdir -p "$APP_NAME/Contents/Frameworks"
          mkdir -p "$APP_NAME/Contents/Resources"
          mkdir -p "dmgStaging"
  
          # Setup environment based on architecture
          if [[ "${{ matrix.target }}" == "osx-x64" ]]; then
            softwareupdate --install-rosetta --agree-to-license
            if [ ! -f /usr/local/bin/brew ]; then
               arch -x86_64 /bin/bash -c "$(curl -fsSL https://raw.githubusercontent.com/Homebrew/install/HEAD/install.sh)"
            fi
            arch -x86_64 /usr/local/bin/brew install ffmpeg dylibbundler
            BREW_PREFIX="/usr/local"
            BUNDLE_CMD="arch -x86_64 dylibbundler"
          else
            brew install ffmpeg dylibbundler
            BREW_PREFIX="/opt/homebrew"
            BUNDLE_CMD="dylibbundler"
          fi
            
          # Copy and strip binaries from the correct Brew path
          ditto "$BREW_PREFIX/bin/ffmpeg" "$APP_NAME/Contents/MacOS/ffmpeg"
          chmod +w "$APP_NAME/Contents/MacOS/ffmpeg"
          ditto "$BREW_PREFIX/bin/ffprobe" "$APP_NAME/Contents/MacOS/ffprobe"
          chmod +w "$APP_NAME/Contents/MacOS/ffprobe"
          
          strip -x "$APP_NAME/Contents/MacOS/ffmpeg"
          strip -x "$APP_NAME/Contents/MacOS/ffprobe"
            
          # Bundle all .dylib dependencies into the app using the correct arch tool
          $BUNDLE_CMD -od -b -x "$APP_NAME/Contents/MacOS/ffmpeg" -d "$APP_NAME/Contents/Frameworks/" -p "@executable_path/../Frameworks/"
          $BUNDLE_CMD -od -b -x "$APP_NAME/Contents/MacOS/ffprobe" -d "$APP_NAME/Contents/Frameworks/" -p "@executable_path/../Frameworks/"
            
          # Strip libraries to save space
          for lib in "$APP_NAME/Contents/Frameworks/"*.dylib; do
            strip -x "$lib"
          done
            
          # Bundle the .NET app and resources using ditto (HFS compression)
          ditto --hfsCompression outputFolder/ "$APP_NAME/Contents/MacOS/"
          [ -f "Info.plist" ] && ditto --hfsCompression "Info.plist" "$APP_NAME/Contents/Info.plist"
          [ -f "macOS_AppIcon.icns" ] && ditto --hfsCompression "macOS_AppIcon.icns" "$APP_NAME/Contents/Resources/AppIcon.icns"
            
          # Ensure everything is executable
          chmod +x "$APP_NAME/Contents/MacOS/VDF.GUI"
          chmod +x "$APP_NAME/Contents/MacOS/ffmpeg"
          chmod +x "$APP_NAME/Contents/MacOS/ffprobe"

          # Remove extended attributes (Quarantine) before signing
          xattr -rc "$APP_NAME"
        
          # Final step: Sign EVERYTHING inside the bundle to prevent integrity errors
          find "$APP_NAME/Contents" -type f -exec codesign --force --sign - {} \;
        
          # Seal the entire bundle to satisfy Gatekeeper
          codesign --force --sign - "$APP_NAME"

          
          
          # 1. Install dmgbuild tool
          pip3 install dmgbuild

          # 2. Prepare clean staging (No 'z' prefixes needed!)
          rm -rf "$dmgStaging" && mkdir -p "$dmgStaging"
          ditto --hfsCompression "$APP_NAME" "$dmgStaging/$APP_NAME"
          ln -s /Applications "$dmgStaging/Applications"
            
          printf "If the app doesn't open (Gatekeeper warning):\n\n1. Open Terminal\n2. Paste: xattr -d com.apple.quarantine \n3. Add one space after the command\n4. Drag the .dmg file into Terminal\n5. Press Return/Enter\n\nNow you can run the app or drag it to Applications." > "$dmgStaging/ReadMe.txt"

          # 3. Create dmgbuild settings file inside the script
          cat <<EOF > dmg_settings.py
          import os
            
          # Volume settings
          volume_name = 'VideoDuplicateFinder'
          format = 'ULMO' # Force LZMA compression
          size = None
            
          # Files and locations (X, Y)
          # README (Left), App (Center), Applications (Right)
          files = [
            ('$dmgStaging/$APP_NAME', '$APP_NAME'),
            ('$dmgStaging/Applications', 'Applications'),
            ('$dmgStaging/README.txt', 'README.txt')
          ]
            
          icon_locations = {
            'README.txt': (100, 160),
            '$APP_NAME': (275, 160),
            'Applications': (450, 160)
          }
            
          # Window appearance
          window_rect = ((400, 200), (550, 350)) # {x, y}, {width, height}
          icon_size = 140
            
          # Hide UI elements (This hides the Tab Bar and Toolbar)
          show_status_bar = False
          show_tab_bar = False
          show_toolbar = False
          show_sidebar = False
            
          # Final touches
          hide_extensions = ['README.txt']
          EOF

          # 4. Generate the final DMG using the Python settings
          dmgbuild -s dmg_settings.py "VideoDuplicateFinder" "${release_name}.dmg"

          # Cleanup
          rm -rf "$APP_NAME" "$dmgStaging" dmg_settings.py



          # Original Windows logic
          elif [ "${{ matrix.target }}" == "win-x64" ]; then
            7z a -tzip "${release_name}.zip" "./outputFolder/*"
          
          # Original Linux logic
          else
            tar czvf "${release_name}.tar.gz" "outputFolder"
          fi
          
          # Delete output directory
          rm -r "outputFolder"
          
    - name: Publish
      uses: softprops/action-gh-release@v2
      with:
          tag_name: 3.0.x
          files: App*
          body: |
            Note: These are daily builds. Attachments are automatically created and replaced on every new commit. Regardless of what the message above says. If you experience upgrade issues you may need to delete your 'ScannedFiles.db' file in VDF folder.
            Last build based on ${{ steps.vars.outputs.sha_short }}
      env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
